# Shell Fake Core - RetroArch Configuration
# Sample configuration for the Shell Fake Core

# Core Options
shell_fake_shell = "bash"
shell_fake_timeout = "60"
shell_fake_working_dir = "script_dir"
shell_fake_capture_output = "enabled"
shell_fake_interactive = "disabled"
shell_fake_auto_restart = "disabled"
shell_fake_font_size = "medium"

# Video Settings
video_driver = "gl"
video_width = 640
video_height = 480
video_fullscreen = false
video_windowed_fullscreen = false
video_scale = 2

# Audio Settings
audio_driver = "pulse"
audio_enable = true
audio_mute_enable = false

# Input Settings
input_player1_joypad_index = 0
input_autodetect_enable = true

# Menu Settings
menu_driver = "rgui"
menu_show_core_updater = true

# Directory Settings
system_directory = "~/.config/retroarch/system"
savefile_directory = "~/.config/retroarch/saves"
savestate_directory = "~/.config/retroarch/states"
screenshot_directory = "~/.config/retroarch/screenshots"

# Logging
log_verbosity = true
log_to_file = false

# Core-specific notes:
# Place your .sh script files anywhere and load them as ROMs
# The core will execute them using the configured shell interpreter
# Make sure your scripts are executable (chmod +x script.sh)
# Only run scripts from trusted sources for security reasons